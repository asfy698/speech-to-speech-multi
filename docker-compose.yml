---
name: speech-to-speech-help

services:
  help:
    image: alpine:3.20
    command:
      - sh
      - -c
      - |
        echo "Use one of these explicit compose files:"
        echo "  docker compose -f docker-compose.english.yml up pipeline"
        echo "  docker compose -f docker-compose.tamil.yml up pipeline"
        echo "  docker compose -f docker-compose.dev.yml up dev"
